services:
  gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MEMBER_SERVICE_URL: http://member-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8082
      BORROWING_SERVICE_URL: http://borrowing-service:8083
      LIBRARY_ORCHESTRATOR_URL: http://library-orchestrator:8084
    depends_on:
      member-service:
        condition: service_started
      catalog-service:
        condition: service_started
      borrowing-service:
        condition: service_started
      library-orchestrator:
        condition: service_started

  member-db:
    image: postgres:16
    container_name: member-db
    environment:
      POSTGRES_DB: member_db
      POSTGRES_USER: member
      POSTGRES_PASSWORD: member
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U member -d member_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  member-service:
    build:
      context: .
      dockerfile: member-service/Dockerfile
    container_name: member-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: pg
      POSTGRES_HOST: member-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: member_db
      POSTGRES_USER: member
      POSTGRES_PASSWORD: member
    depends_on:
      member-db:
        condition: service_healthy

  catalog-db:
    image: postgres:16
    container_name: catalog-db
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  catalog-service:
    build:
      context: .
      dockerfile: catalog-service/Dockerfile
    container_name: catalog-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: pg
      POSTGRES_HOST: catalog-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: catalog_db
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    depends_on:
      catalog-db:
        condition: service_healthy

  borrowing-db:
    image: postgres:16
    container_name: borrowing-db
    environment:
      POSTGRES_DB: borrowing_db
      POSTGRES_USER: borrowing
      POSTGRES_PASSWORD: borrowing
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U borrowing -d borrowing_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  borrowing-service:
    build:
      context: .
      dockerfile: borrowing-service/Dockerfile
    container_name: borrowing-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: pg
      POSTGRES_HOST: borrowing-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: borrowing_db
      POSTGRES_USER: borrowing
      POSTGRES_PASSWORD: borrowing
    depends_on:
      borrowing-db:
        condition: service_healthy

  orchestrator-db:
    image: postgres:16
    container_name: orchestrator-db
    environment:
      POSTGRES_DB: orchestrator_db
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d orchestrator_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  library-orchestrator:
    build:
      context: .
      dockerfile: library-orchestrator/Dockerfile
    container_name: library-orchestrator
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: pg
      POSTGRES_HOST: orchestrator-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: orchestrator_db
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      MEMBER_SERVICE_URL: http://member-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8082
      BORROWING_SERVICE_URL: http://borrowing-service:8083
    depends_on:
      orchestrator-db:
        condition: service_healthy
      member-service:
        condition: service_started
      catalog-service:
        condition: service_started
      borrowing-service:
        condition: service_started
