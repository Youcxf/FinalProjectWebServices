services:
  library-postgres:
    image: postgres:16
    container_name: library-postgres
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library -d library_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: library-app
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: pg
      POSTGRES_HOST: library-postgres
      POSTGRES_DB: library_db
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
    depends_on:
      library-postgres:
        condition: service_healthy

volumes:
  postgres-data:
